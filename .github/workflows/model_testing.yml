name: ML Model Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "ml/**"
      - "tests/ml_tests/**"
      - ".github/workflows/model_testing.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "ml/**"
      - "tests/ml_tests/**"
      - ".github/workflows/model_testing.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ML Pipeline Tests
    runs-on: ubuntu-latest

    env:
      PROJECT_ID:          music-recommender-490319
      FIRESTORE_DATABASE:  auxless
      BUCKET:              youtube-pipeline-staging-bucket
      GRU_MODEL_PATH:      ml/gru/gru_model.pt
      CI: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ml-${{ hashFiles('tests/ml_tests/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ml-

      - name: Install ML test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/ml_tests/requirements.txt
          pip install pytest pytest-cov
          pip install google-cloud-bigquery google-cloud-firestore google-cloud-storage
          pip install functions-framework
          pip install sentence-transformers==3.0.0

      - name: Create package __init__.py files
        run: |
          mkdir -p ml/recommendation/cf
          mkdir -p ml/evaluation
          touch ml/__init__.py
          touch ml/preprocessing/__init__.py
          touch ml/feature_engineering/__init__.py
          touch ml/recommendation/__init__.py
          touch ml/recommendation/cf/__init__.py
          touch ml/gru/__init__.py
          touch ml/evaluation/__init__.py
          touch tests/__init__.py
          touch tests/ml_tests/__init__.py

      - name: Run ML tests
        run: |
          pytest tests/ml_tests/ \
            -v \
            --tb=short \
            --ignore=tests/ml_tests/test_model.py \
            --cov=ml \
            --cov-report=term-missing \
            --cov-report=xml:coverage_ml.xml \
            --cov-fail-under=60

      - name: Upload ML coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage_ml.xml
          flags: ml
          fail_ci_if_error: false